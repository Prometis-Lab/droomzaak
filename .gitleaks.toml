# gitleaks / Betterleaks config for Droomzaak.
# Both tools auto-discover this at repo root. Keeps all built-in rules and
# allowlists only the templated example files (placeholders, never real secrets).

title = "droomzaak gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Templated demo/env example files — placeholders only"
paths = [
  '''\.env\.demo\.example$''',
  '''\.env\.example$''',
  '''.*\.example$''',
  '''\.claude/settings\.local\.json\.example$''',
]

[[allowlists]]
description = "Friday demo secrets file — holds REAL keys but is gitignored (.gitignore) and never committed. The working-tree `dir` scan walks it anyway and would flag it on every run; .gitignore is the real guard. (Trade-off: a forced `git add -f .env.demo` would no longer be caught by gitleaks — rely on .gitignore + review for that.)"
paths = [
  '''(^|/)\.env\.demo$''',
]

[[allowlists]]
description = "Out-of-scope: third-party / generated / cached code (not ours). Mirrors .semgrepignore — these carry test fixtures full of fake secrets and would drown real findings."
paths = [
  '''^\.cache/''',                 # cloned SAST rulesets — test fixtures with planted secrets
  '''^\.claude/skills/vendored/''', # vendored Apache-2.0 skills
  '''^reference/''',                # local inspiration repos (gitignored)
  '''^inherited/''',                # inherited toolkits (gitignored)
  '''^node_modules/''',
  '''(^|/)\.venv/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
]
